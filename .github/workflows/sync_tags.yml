name: Daily AO3 Tag Scraper

on:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 06:00 UTC 
  workflow_dispatch: # Allows you to run it manually anytime via the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Run Scraper
      run: |
        python sync_tags.py 

    - name: Commit and Push Updated JSON
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@github.com"
        git add search/tags.json
        git commit -m "Automated daily tag update" || exit 0
        git push
