[type="checkbox"] {
    display: none;

.sidenav {
  height: 100%;
  width: 200px;
  position: fixed;
  z-index: 1;
  top: 10%;
  right: 0;
  background-color: #111;
  overflow-x: hidden;
  padding-top: 20px;
}

/* Style the sidenav links and the dropdown button */
.sidenav span, .dropdown-btn {
    font-family: 'Libre Franklin';
    padding: 6px 8px 6px 16px;
    text-decoration: none;
    font-size: 20px;
    color: #818181;
    display: block;
    border: none;
    background: none;
    width:100%;
    text-align: left;
    cursor: pointer;
    outline: none;
}

/* On mouse-over */
.sidenav span:hover, .dropdown-btn:hover {
  color: #f1f1f1;
}

/* Main content */
.main {
  margin-left: 200px; /* Same as the width of the sidenav */
  font-size: 20px; /* Increased text to enable scrolling */
  padding: 0px 10px;
}

/* Add an active class to the active dropdown button */
.active {
  background-color: green;
  color: white;
}

/* Dropdown container (hidden by default). Optional: add a lighter background color and some left padding to change the design of the dropdown content */
.dropdown-container {
  display: none;
  background-color: #262626;
  padding-left: 8px;
}

/* Optional: Style the caret down icon */
.fa-caret-down {
  float: right;
  padding-right: 8px;
}

#tagSearch {
    width: 100%; 
    padding: 10px; 
    margin-bottom: 10px;
    background-color: #2c2b2b;
    border-radius: 8px;
    border-bottom: #000;
}

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>
    <!-- The Search Bar & Pinned Buttons -->
    <input type="text" id="tagSearch" placeholder="Search tags...">

    <div>
        <button onclick="copyPinned()" id="copyAll">Copy All</button>
        <button onclick="clearPinned()" id="clearAll">Clear All</button>
    </div>

    <!-- Pinned Section -->
    <div id="pinnedSection">
        <strong>Current Selection:</strong>
        <ul id="pinnedList"></ul>
    </div>

    <!-- Filters -->
    <div class="sidenav">
        <button class="dropdown-btn">Include
            <i class="fas fa-caret-down"></i>
        </button>
        <div class="dropdown-container">
            <div class="filters">
                <label><input type="checkbox" onchange="toggleFilter('nsfw', 'include')">NSFW</label>
                <label><input type="checkbox" onchange="toggleFilter('sfw', 'include')">SFW</label>
                <label><input type="checkbox" onchange="toggleFilter('dddne', 'include')">DDDNE</label>
                <label><input type="checkbox" onchange="toggleFilter('angst', 'include')">Angst</label>
                <label><input type="checkbox" onchange="toggleFilter('silly', 'include')">Silly</label>
                <label><input type="checkbox" onchange="toggleFilter('au', 'include')">AUs</label>
            </div>
        </div>
        <button class="dropdown-btn">Exclude
            <i class="fas fa-caret-down"></i>
        </button>
        <div class="dropdown-container">
            <div class="filters">
                <label><input type="checkbox" onchange="toggleFilter('nsfw', 'exclude')">NSFW</label>
                <label><input type="checkbox" onchange="toggleFilter('sfw', 'exclude')">SFW</label>
                <label><input type="checkbox" onchange="toggleFilter('dddne', 'exclude')">DDDNE</label>
                <label><input type="checkbox" onchange="toggleFilter('angst', 'exclude')">Angst</label>
                <label><input type="checkbox" onchange="toggleFilter('silly', 'exclude')">Silly</label>
                <label><input type="checkbox" onchange="toggleFilter('au', 'exclude')">AUs</label>
            </div>
        </div>
    </div>
    <div class="public-filters" style="margin: 20px 0;">
        <strong>Filter By:</strong>
    </div>

<!-- The List -->
<ol id="list_for_freeform_0" class="tags index group"></ol>

<script>
    let allTags = [];
    let pinnedTags = new Set();

    let tagData = { all: [], nsfw: [], sfw: [], au: [], angst: [], dddne: [], silly: []};
    let currentGroup = 'all' // default view

    // Track multiple active filters
    let activeIncludes = new Set();
    let activeExcludes = new Set();

    const searchInput = document.getElementById('tagSearch');
    const listElement = document.getElementById('list_for_freeform_0');
    const pinnedList = document.getElementById('pinnedList');
    const pinnedSection = document.getElementById('pinnedSection');
    const modModal = document.getElementById('modModal')
    const modPassField = document.getElementById('modPassField')

    function loadFromStorage() {
        const saved = localStorage.getItem('myPinnedTags');
        if (saved) {
            pinnedTags = new Set(JSON.parse(saved));
            updatePinnedUI();
        }
    }
    //add tag to pinned
    function togglePinByIndex(index) {
        const tag = tagData.all[index]

        if (pinnedTags.has(tag)) {
            pinnedTags.delete(tag);
        } else {
            if (pinnedTags.size >= 20) { 
                alert("Too many tags! The DKBK Fanwork Exchange Collection has a limit of up to 20 tags.")
                renderTags(searchInput.value)
                return
            }
            pinnedTags.add(tag);
        }

        localStorage.setItem('myPinnedTags', JSON.stringify(Array.from(pinnedTags)));

        updatePinnedUI();
        renderTags(searchInput.value);
    }

    function updatePinnedUI() {
        if (pinnedTags.size > 0) {
            pinnedSection.style.display = 'block';
            pinnedList.innerHTML = Array.from(pinnedTags).map(tag =>
                `<span>${tag}</span>`
            ).join(' ');
        } else {
            pinnedSection.style.display = 'none';
        }
    }

    function renderTags(str = '') {
        let filtered;

        if (activeIncludes.size == 0) {
            filtered = [...tagData.all];
        } else {
            let combined = [];
            activeIncludes.forEach(group => {
                combined = combined.concat(tagData[group] || []);
            });

            filtered = [...new Set(combined)];
        }

        activeExcludes.forEach(group => {
            const excludeList = tagData[group] || [];
            filtered = filtered.filter(tag => !excludeList.includes(tag));
        });

        filtered = filtered.filter(tag =>
            tag.toLowerCase().includes(str.toLowerCase())
        );

        let html = "";

        filtered.forEach((tag) => {
            const isChecked = pinnedTags.has(tag) ? 'checked' : '';
            const globalIndex = tagData.all.indexOf(tag);

                html += `
                    <li>
                        <label>
                            <input type="checkbox" ${isChecked} onchange="togglePinByIndex(${globalIndex})">
                            <span style="vertical-align: middle;">${tag}</span>
                        </label>
                    </li>`;
        });
        listElement.innerHTML = html;
    }

    //filter
    window.toggleFilter = (groupName, type) => {
        const targetSet = (type == 'include') ? activeIncludes : activeExcludes;

        if (targetSet.has(groupName)) {
            targetSet.delete(groupName);
        } else {
            targetSet.add(groupName);
        }

        renderTags(searchInput.value);
    }

    //copy to clipboard
    window.copyPinned = () => {
        if (pinnedTags.size === 0) return alert("Nothing pinned to copy!");
        if (pinnedTags.size > 20) return alert("Too many tags! The DKBK Fanwork Exchange Collection has a limit of up to 20 tags.")
        const text = Array.from(pinnedTags).join(', ');
        navigator.clipboard.writeText(text);
        alert("Pinned tags copied to clipboard!")
    };

    //clear pinned
    window.clearPinned = () => {
        if (confirm("Unpin all selected tags?")) {
            pinnedTags.clear();
            localStorage.removeItem('myPinnedTags');
            updatePinnedUI();
            renderTags(searchInput.value);
        }
    };

    window.addEventListener('load', () => {
        // DEBUG: Let's see if the script even finds your HTML elements
        if (!searchInput || !listElement) {
            alert("HTML elements missing! Check your IDs.");
            return;
        }

        fetch('tags.json')
            .then(response => response.json())
            .then(data => {
                tagData = data;
                loadFromStorage();
                renderTags();

                searchInput.addEventListener('input', (e) => {
                    renderTags(e.target.value);
                });
            })
            .catch(err => {
                listElement.innerHTML = "<li>Error: tags not found</li>"
            })
    });

    // FILTER LOGIC //
    var dropdown = document.getElementsByClassName("dropdown-btn");
    var i;

    for (i = 0; i < dropdown.length; i++) {
    dropdown[i].addEventListener("click", function() {
        this.classList.toggle("active");
        var dropdownContent = this.nextElementSibling;
        if (dropdownContent.style.display === "block") {
        dropdownContent.style.display = "none";
        } else {
        dropdownContent.style.display = "block";
        }
    });
    }
</script>


</body>
