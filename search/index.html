<!DOCTYPE html>
<html lang="en">
<style>
body {
    background: #111;
    color: #818181;
    font-family: 'Libre Franklin';
}
label {
    cursor: pointer;
    display: inline-block; 
    vertical-align: middle;
    line-height: 25px;
    padding: 8px 12px;
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
}
li:has(input:checked), label:has(input:checked) {
    background-color: #262626;
    color: #f0f0f0;
    list-style-position: inside;
    margin-right: 2vh;
    border-radius: 8px;
    margin-bottom: 0;
}
/* Remove TOP rounding if the PREVIOUS item was checked */
li:has(input:checked) + li:has(input:checked) {
    border-top-left-radius: 0 !important;
    border-top-right-radius: 0 !important;

    margin-top: -10px;
    padding-top: 18px;
}
/* Remove BOTTOM rounding if the NEXT item is also checked */
li:has(input:checked):has(+ li:has(input:checked)) {
    border-bottom-left-radius: 0 !important;
    border-bottom-right-radius: 0 !important;
}

li {
    list-style-position: inside;
    padding: 0 12px;
    overflow-wrap: normal;
    overflow-x: hidden;
}
#pinnedSection {
    background: #181818;
    /* display: none;  */
    /* padding: 10px;  */
    border: 1px solid #000; 
    border-radius: 8px;
    /* margin: 10px 0px; */
    margin-right: 210px;
    font-size: larger;
    overflow: hidden; 

    opacity: 0;
    max-height: 0px;
    padding-top: 0px;
    padding-bottom: 0px;
    margin-top: 0px;
    margin-bottom: 0px;
    border-color: transparent;

    transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                margin 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                padding 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
#pinnedSection.section-expanded {
    opacity: 1;
    max-height: 500px;
    padding: 10px; 
    margin-top: 10px;
    margin-bottom: 10px;
    border-color: #000;
}
.section-shrinking {
    opacity: 0 !important;
    max-height: 0 !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    border-color: transparent !important;
}
#pinnedList {
    list-style: none; 
    padding: 0; 
    display: flex; 
    flex-wrap: wrap; 
    gap: 10px; 
    margin-top: 10px;
    margin-right: 200px;
    font-size: larger;
}
.pill-shrinking {
    opacity: 0 !important;
    transform: scale(0.7) !important;
    max-width: 0 !important;
    font-size: 0px !important;
    line-height: 0 !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    border-color: transparent !important;
    overflow: hidden !important;
}
#pinnedList span {
    background:#262626; 
    border: 1px solid #000; 
    padding: 6px 12px; 
    border-radius: 8px;
    color:#f0f0f0;

    /* Transition to remove */
    transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                transform 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                max-width 0.35s ease;
    opacity: 1;
    transform: scale(1);
    max-width: 100%;
}

#unpin:hover {
    color: #818181;
}
#copyAll, #clearAll {
    margin-bottom: 10px;
    cursor: pointer; 
    background: #35826d;
    color: #f0f0f0f0;
    border-radius: 5px;
    border: 1px solid #0f3128;
    font-family: 'Libre Franklin';
    font-weight: 600;
    font-size: larger;
}
#clearAll { 
    background: #eb8016;
    margin-left: 10px; 
    border: 1px solid #aa5a0a;
}
[type="checkbox"] {
    display: none;
}

#tagSearch {
    width: 99%; 
    padding: 10px; 
    margin-bottom: 10px;
    background-color: #2c2b2b;
    border-radius: 8px;
    border: #000;
    font-family: 'Gidole';
    text-transform: uppercase;
    font-size: large;

    position: sticky;
    position: -webkit-sticky;
    top: 0.5%;
    z-index: 10;
}


.sidenav {
  height: 100%;
  width: 200px;
  top: 10%;
  right: 0;
  background-color: #111;
  overflow-x: hidden;
  padding-top: 20px;
  position: fixed;
  z-index: 1;
}

#list_for_freeform_0 {
    margin-right: 200px;
    font-size: larger;
}

.filters label[data-count]::after {
    content: " " attr(data-count);
    text-transform: none !important;
}

/* Style the sidenav links and the dropdown button */
.sidenav span, .dropdown-btn {
    font-family: 'Libre Franklin';
    font-weight: bold;
    padding: 6px 8px 6px 16px;
    text-decoration: none;
    color: #818181;
    display: block;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    outline: none;
    font-size: 200%;
}

/* On mouse-over */
.filters label:hover, .dropdown-btn:hover {
  color: #f1f1f1;
  background-color: #262626;
}

/* Add an active class to the active dropdown button */
.active {
  background-color: #262626;
  color: #f1f1f1;
}

/* Dropdown container (hidden by default). Optional: add a lighter background color and some left padding to change the design of the dropdown content */
.dropdown-container {
    display: none;
    background-color: #262626;
    padding-left: 8px;
    font-family: 'Gidole';
    text-transform: uppercase;
    font-weight: bold;
    font-size: x-large;
}

/* Optional: Style the caret down icon */
.fa-caret-down {
  float: right;
  padding-right: 8px;
  font-size: 110%;
}

/* FIXED: Locks both the search bar and the progress track to the top of the viewport */
.sticky-search-header {
    position: -webkit-sticky; /* Safari support */
    position: sticky;
    top: 0;
    z-index: 100; /* Keeps it layered safely on top of your scrolling tag list */
    
    /* CRITICAL: Matches your website background color so tags don't visibly overlap behind the text */
    background-color: #111; 
    
    padding-top: 12px;
    padding-bottom: 4px;
    width: 100%;
    box-sizing: border-box;
}

/* Progress Bar Outer Shield Framework */
.progress-container {
    width: 100%;
    max-width: 100%;
    margin: 8px 0 4px 0;
    box-sizing: border-box;
}

/* Background Groove Line Track */
.progress-bar {
    width: 0%; /* Dynamic width handled by JS */
    height: 6px;
    border-radius: 4px;
    background: linear-gradient(to right, #35826D, #F4912E) fixed;
    background-size: 100% 100%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Fluent expansion */
}

/* Meta Data Information Row below the gauge line */
.progress-text-row {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-family: 'Gidole', sans-serif;
    font-size: 0.85em;
    font-weight: bold;
    color: #818181;
    text-transform: uppercase;
}

/* Warning indicator highlight text element */
.warning-alert-text {
    color: #F4912E;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.2s ease;
}

/* Helper rule to fade in the warning flag */
.warning-alert-text.is-visible {
    opacity: 1;
}

#list-for-freeform_0 li:nth-child(even) {
    background-color: #1e1e1e;
}

@media screen and (max-width: 600px) {
    .sticky-search-header {
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        z-index: 101; /* Layers it right above the dropdown buttons */
        background-color: #111;
    }
    .sidenav {
        width: 100%;
        height: auto;
        position: sticky;
        position: -webkit-sticky;
        top: 75px;
        z-index: 100;
    }
    #list_for_freeform_0 {
        margin-right: 0;
        padding: 0;
    }
    #pinnedSection {
        margin-right: 0;
        padding: 0;
    }
    #pinnedList {
        margin-right: 0;
    }
}

<head>
    <!-- Mobile CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Lilita One -->
    <!-- Libre Franklin -->
    <!-- Gidole -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gidole&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Lilita+One&display=swap" rel="stylesheet">

    <!-- icon -->
     <link rel="icon" type="image/png" href="../icon.png">

</head>
<title>
    Search and Save
</title>
<body>
    <!-- The Search Bar & Pinned Buttons -->
    <div class="sticky-search-header">

        <input type="text" id="tagSearch" placeholder="Search tags...">

        <!-- Progress Bar -->
        <div class="progress-container">
            <div id="pinProgressBar" class="progress-bar"></div>
            <div class="progress-text-row">
                <span id="progressBarLabel">0/20 Tags Pinned</span>
                <span id="progressBarWarning" class="warning-alert-text"></span>
            </div>
        </div>
    </div>

    <div>
        <button onclick="copyPinned()" id="copyAll">Copy All</button>
        <button onclick="clearPinned()" id="clearAll">Clear All</button>
    </div>

    <!-- Pinned Section -->
    <div id="pinnedSection">
        <strong>Current Selection:</strong>
        <ul id="pinnedList"></ul>
    </div>

    <!-- Filters -->
    <div class="sidenav">
        <button class="dropdown-btn">Include
            <i class="fas fa-caret-down"></i>
        </button>
        <div class="dropdown-container">
            <div class="filters">
                <label data-name="nsfw"><input type="checkbox" onchange="toggleFilter('nsfw', 'include')">NSFW</label>
                <label data-name="sfw"><input type="checkbox" onchange="toggleFilter('sfw', 'include')">SFW</label>
                <label data-name="dddne"><input type="checkbox" onchange="toggleFilter('dddne', 'include')">DDDNE</label>
                <label data-name="angst"><input type="checkbox" onchange="toggleFilter('angst', 'include')">Angst</label>
                <label data-name="silly"><input type="checkbox" onchange="toggleFilter('silly', 'include')">Silly</label>
                <label data-name="au"><input type="checkbox" onchange="toggleFilter('au', 'include')">AUs</label>
            </div>
        </div>
        <button class="dropdown-btn">Exclude
            <i class="fas fa-caret-down"></i>
        </button>
        <div class="dropdown-container">
            <div class="filters">
                <label data-name="nsfw"><input type="checkbox" onchange="toggleFilter('nsfw', 'exclude')">NSFW</label>
                <label data-name="sfw"><input type="checkbox" onchange="toggleFilter('sfw', 'exclude')">SFW</label>
                <label data-name="dddne"><input type="checkbox" onchange="toggleFilter('dddne', 'exclude')">DDDNE</label>
                <label data-name="angst"><input type="checkbox" onchange="toggleFilter('angst', 'exclude')">Angst</label>
                <label data-name="silly"><input type="checkbox" onchange="toggleFilter('silly', 'exclude')">Silly</label>
                <label data-name="au"><input type="checkbox" onchange="toggleFilter('au', 'exclude')">AUs</label>
            </div>
        </div>
    </div>


<!-- The List -->
    <ol id="list_for_freeform_0" class="tags index group"></ol>

<script>
    let allTags = [];
    let pinnedTags = new Set();

    let allTagsMaster = [];

    let tagData = { all: [], round_specific: [], nsfw: [], sfw: [], au: [], angst: [], dddne: [], silly: []};
    let currentGroup = 'all' // default view

    // Track multiple active filters
    let activeIncludes = new Set();
    let activeExcludes = new Set();

    const searchInput = document.getElementById('tagSearch');
    const listElement = document.getElementById('list_for_freeform_0');
    const pinnedList = document.getElementById('pinnedList');
    const pinnedSection = document.getElementById('pinnedSection');
    const modModal = document.getElementById('modModal')
    const modPassField = document.getElementById('modPassField')

    function updateCategoryCounters() {
        const groupsToCount = ['nsfw', 'sfw', 'dddne', 'angst', 'silly', 'au'];

        groupsToCount.forEach(groupName => {
            if (tagData[groupName]) {
                const totalTags = tagData[groupName].length;
                
                // Target existing labels using the data-name attribute
                const targetLabels = document.querySelectorAll(`label[data-name="${groupName}"]`);
                
                targetLabels.forEach(label => {
                    // Instantly passes the number value directly into CSS memory
                    label.setAttribute('data-count', `(${totalTags})`);
                });
            }
        });
    }

    function loadFromStorage() {
        // Check for URL params
        const urlParams = new URLSearchParams(window.location.search);
        const urlPins = urlParams.get('pins');

        if (urlPins) {
            pinnedTags = new Set();

            // Convert params back into the original indexing
            const structuralIndexes = urlPins.split(',').map(num => parseInt(num, 10));

            structuralIndexes.forEach(idx => {
                const matchedTagString = allTagsMaster[idx];
                if (matchedTagString) {
                    pinnedTags.add(matchedTagString);
                }
            });

            // Save it to local storage right away so they don't lose it
            localStorage.setItem('myPinnedTags', JSON.stringify(Array.from(pinnedTags)));
            console.log("Draft configuration loaded successfully from URL.");
        } else {
            const saved = localStorage.getItem('myPinnedTags');
            if (saved) {
                pinnedTags = new Set(JSON.parse(saved));
            }
        }

        updatePinnedUI();
    }
    //add tag to pinned
    function togglePinByIndex(globalMasterIndex) {
        const tag = allTagsMaster[globalMasterIndex];
        
        if (!tag) return;

        if (pinnedTags.has(tag)) {
            pinnedTags.delete(tag);
        } else {
            if (pinnedTags.size >= 20) { 
                alert("Too many tags! The DKBK Fanwork Exchange Collection has a limit of up to 20 tags.");
                renderTags(searchInput.value);
                return;
            }
            pinnedTags.add(tag);
        }

        localStorage.setItem('myPinnedTags', JSON.stringify(Array.from(pinnedTags)));

        updatePinnedUI();
        renderTags(searchInput.value);
    }

    //Helper function that handles data after the animation stops
    function executePinToggleLogic(tag) {
        const pinnedSectionElement = document.getElementById('pinnedSection')

        if (pinnedTags.has(tag)) {
            pinnedTags.delete(tag);
        } else {
            if (pinnedTags.size >= 20) { 
                alert("Too many tags! The DKBK Fanwork Exchange Collection has a limit of up to 20 tags.");
                renderTags(searchInput.value);
                return;
            }

            if (pinnedSectionElement) {
                pinnedSectionElement.classList.remove('section-shrinking');
            }
            pinnedTags.add(tag);
        }

        localStorage.setItem('myPinnedTags', JSON.stringify(Array.from(pinnedTags)));

        updatePinnedUI();
        renderTags(searchInput.value);
    }

    function updatePinnedUI() {
        const pinnedSectionElement = document.getElementById('pinnedSection');

        if (pinnedTags.size > 0) {
            if (pinnedSectionElement) {
                pinnedSectionElement.classList.add('section-expanded');
            }

            // pinnedSection.style.display = 'block';
            pinnedList.innerHTML = Array.from(pinnedTags).map(tag => {
                let textColorStyle = '';

                if (tagData.round_specific && tagData.round_specific.includes(tag)) {
                    textColorStyle = 'color: #FDBA12;';
                }

                const safeGlobalIndex = allTagsMaster.indexOf(tag);

                return `
                    <span style="${textColorStyle}">
                        ${tag}
                        <span id="unpin" style="cursor: pointer; border-radius: 0; border: 0;" onclick="animateUnpin(event, ${safeGlobalIndex})">&times;</span>
                    </span>
                    `
                }
            ).join(' ');
        } else {
            pinnedList.innerHTML = '';
        }

        // Progress Bar
        const currentCount = pinnedTags.size;
        const maxLimit = 20;

        const percentage = Math.min((currentCount / maxLimit) * 100, 100);

        const progressBar = document.getElementById('pinProgressBar');
        const progressLabel = document.getElementById('progressBarLabel');
        const progressWarning = document.getElementById('progressBarWarning');

        if (progressBar && progressLabel && progressWarning) {
            // Update the meter gauge bar width
            progressBar.style.width = `${percentage}%`;
            
            // Adjust label text
            progressLabel.textContent = `${currentCount}/${maxLimit} Tags Pinned`;

            // Display dynamic context messaging layers based on fill thresholds
            if (currentCount >= maxLimit) {
                progressWarning.textContent = "CAPPED (20 Max)!";
                progressWarning.classList.add('is-visible');
            } else if (currentCount >= 16) {
                progressWarning.textContent = "Approaching Limit";
                progressWarning.classList.add('is-visible');
            } else {
                progressWarning.textContent = "";
                progressWarning.classList.remove('is-visible');
            }
        }

        // Live URL updating to share pinned tags in URL
        if (allTagsMaster && allTagsMaster.length > 0) {
            setTimeout(() => {
                if (pinnedTags.size > 0) {
                    const indexList = Array.from(pinnedTags)
                        .map(tag => allTagsMaster.indexOf(tag))
                        .filter(idx => idx != -1);

                    const newQueryString = `?pins=${indexList.join(',')}`;

                    window.history.replaceState({}, document.title, window.location.pathname + newQueryString);
                } else {
                    // If no tags, clear params
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, 0);
        }
    }

    function updateProgressBar(manualAdjustment = 0) {
        // Calculate the fake temporary count for the visual transition
        const currentCount = Math.max(0, pinnedTags.size + manualAdjustment);
        const maxLimit = 20;
        const percentage = Math.min((currentCount / maxLimit) * 100, 100);

        const progressBar = document.getElementById('pinProgressBar');
        const progressLabel = document.getElementById('progressBarLabel');
        const progressWarning = document.getElementById('progressBarWarning');

        if (progressBar && progressLabel && progressWarning) {
            progressBar.style.width = `${percentage}%`;
            progressLabel.textContent = `${currentCount}/${maxLimit} Tags Pinned`;

            if (currentCount >= maxLimit) {
                progressWarning.textContent = "CAPPED (20 Max)!";
                progressWarning.classList.add('is-visible');
            } else if (currentCount >= 16) {
                progressWarning.textContent = "Approaching Limit";
                progressWarning.classList.add('is-visible');
            } else {
                progressWarning.textContent = "";
                progressWarning.classList.remove('is-visible');
            }
        }
    }

    function renderTags(str = '') {
        let masterPool = [];

        if (tagData.all) {
            tagData.all.forEach((tag, idx) => {
                masterPool.push({ text: tag, originalIndex: idx, sourceGroup: 'all' });
            });
        }

        if (tagData.round_specific) {
            tagData.round_specific.forEach((tag, idx) => {
                masterPool.push({ text: tag, originalIndex: idx, sourceGroup: 'round_specific' });
            });
        }

        // Remove duplicate text objects (favoring round_specific coloring if duplicates exist)
        let uniqueMap = new Map();
        masterPool.forEach(item => {
            if (!uniqueMap.has(item.text) || item.sourceGroup === 'round_specific') {
                uniqueMap.set(item.text, item);
            }
        });
        let displayList = Array.from(uniqueMap.values());

        // Process active filter inclusions/exclusions
        if (activeIncludes.size > 0) {
            displayList = displayList.filter(item => {
                return Array.from(activeIncludes).some(group => {
                    return tagData[group] && tagData[group].includes(item.text);
                });
            });
        }

        activeExcludes.forEach(group => {
            const excludeList = tagData[group] || [];
            displayList = displayList.filter(item => !excludeList.includes(item.text));
        });

        // Process search input string matching
        if (str) {
            const cleanSearchInput = str.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            displayList = displayList.filter(item => {
                const cleanTagText = item.text.toLowerCase().replace(/[^a-z0-9]/g, '');
                return cleanTagText.includes(cleanSearchInput);
            });
        }

        // Sort everything alphabetically without losing our index mappings
        displayList.sort((a, b) => a.text.localeCompare(b.text, undefined, { sensitivity: 'base' }));

        // Generate the HTML output
        let html = "";
        displayList.forEach((item) => {
            const isChecked = pinnedTags.has(item.text) ? 'checked' : '';
            let textColorStyle = '';

            if (item.sourceGroup === 'round_specific') {
                textColorStyle = 'color: #FDBA12;';
            }

            const safeGlobalIndex = allTagsMaster.indexOf(item.text);

            html += `
                <li>
                    <label>
                        <input type="checkbox" ${isChecked} onchange="togglePinByIndex(${safeGlobalIndex})">
                        <span style="vertical-align: middle; ${textColorStyle}">${item.text}</span>
                    </label>
                </li>`;
        });
        listElement.innerHTML = html;
    }

    //unpin animation
    window.animateUnpin = (event, safeGlobalIndex) => {
        const targetPill = event.target.closest('span:not(#unpin)');
        const pinnedSectionElement = document.getElementById('pinnedSection');

        if (targetPill) {
            updateProgressBar(-1);

            targetPill.classList.add('pill-shrinking');

            if (pinnedTags.size == 1 && pinnedSectionElement) {
                pinnedSectionElement.classList.remove('section-expanded');
            }

            targetPill.addEventListener('transitionend', function handler(e) {
                // Only fire when the main transform/opacity property finishes
                if (e.propertyName == 'opacity' || e.propertyName == 'transform') {
                    // Remove this temporary listener immediately so it doesn't leak memory
                    targetPill.removeEventListener('transitionend', handler);
                    
                    // Execute data states now that visual transitions are 100% complete
                    togglePinByIndex(safeGlobalIndex);
                }
            });
        } else {
            togglePinByIndex(safeGlobalIndex);
        }
    }

    //filter
    window.toggleFilter = (groupName, type) => {
        const targetSet = (type == 'include') ? activeIncludes : activeExcludes;

        if (targetSet.has(groupName)) {
            targetSet.delete(groupName);
        } else {
            targetSet.add(groupName);
        }

        renderTags(searchInput.value);
    }

    //copy to clipboard
    window.copyPinned = () => {
        if (pinnedTags.size === 0) return alert("Nothing pinned to copy!");
        if (pinnedTags.size > 20) return alert("Too many tags! The DKBK Fanwork Exchange Collection has a limit of up to 20 tags.")
        const text = Array.from(pinnedTags).join(', ');
        navigator.clipboard.writeText(text);
        alert("Pinned tags copied to clipboard!")
    };

    //clear pinned
    window.clearPinned = () => {
        if (confirm("Unpin all selected tags?")) {
            pinnedTags.clear();
            localStorage.removeItem('myPinnedTags');
            updatePinnedUI();
            renderTags(searchInput.value);
        }
    };

    window.addEventListener('load', () => {
        // DEBUG: Let's see if the script even finds your HTML elements
        if (!searchInput || !listElement) {
            alert("HTML elements missing! Check your IDs.");
            return;
        }

        fetch('tags.json')
            .then(response => response.json())
            .then(data => {
                tagData = data;

                // Create a permanent, flat master array of every tag text available
                allTagsMaster = [...new Set([...(data.all || []), ...(data.round_specific || [])])];

                updateCategoryCounters(); 

                loadFromStorage();
                updatePinnedUI();
                renderTags();

                searchInput.addEventListener('input', (e) => {
                    renderTags(e.target.value);
                });
            })
            .catch(err => {
                listElement.innerHTML = "<li>Error: tags not found</li>"
            })
    });

    // FILTER LOGIC //
    var dropdown = document.getElementsByClassName("dropdown-btn");
    var i;

    for (i = 0; i < dropdown.length; i++) {
    dropdown[i].addEventListener("click", function() {
        this.classList.toggle("active");
        var dropdownContent = this.nextElementSibling;
        if (dropdownContent.style.display === "block") {
        dropdownContent.style.display = "none";
        } else {
        dropdownContent.style.display = "block";
        }
    });
    }
</script>
