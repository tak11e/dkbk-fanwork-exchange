<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Highlights</title>
    <!-- Bootstrap JS Bundle (Required for the sliding animation) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .carousel-item { min-height: 400px; }
        .carousel-caption-custom { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; }
        .work-img { max-height: 300px; object-fit: contain; margin-bottom: 15px; }
    </style>
</head>
<body>
    <header class="p-3">
        <nav>
            <a href="https://tak11e.github.io/dkbk-fanwork-exchange/search/" class="text-info">Search Tags</a>
        </nav>
    </header>

    <div class="container mt-5">
        <div id="dailyCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner" id="carousel-content">
                <!-- JS will inject slides here -->
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#dailyCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#dailyCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>

    <script>
        async function loadDailyHighlights() {
            try {
                const response = await fetch('collection_works.json');
                const data = await response.json();

                const seed = new Date().toISOString().split('T')[0];

                const picks = [
                    ...getRandomPicks(data.sfw.fics, 2, seed + "sf"),
                    ...getRandomPicks(data.nsfw.fics, 2, seed + "nf"),
                    ...getRandomPicks(data.sfw.art, 2, seed + "sa"),
                    ...getRandomPicks(data.nsfw.art, 2, seed + "na")
                ];

                const container = document.getElementById('carousel-content');
                
                picks.forEach((work, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    
                    // Logic to show image if it's Art
                    const displayImage = (work.image && work.image !== "No image provided.") 
                        ? `<img src="${work.image}" class="work-img d-block mx-auto" alt="Work Preview">` 
                        : '';

                    container.innerHTML += `
                    <div class="carousel-item ${activeClass}">
                        <div class="d-block w-100 p-5 text-center bg-dark text-light border rounded">
                            ${displayImage}
                            <h3>${work.title}</h3>
                            <p class="text-muted small">${work.tags.slice(0, 5).join(', ')}</p>
                            <p>${work.summary.replace(/<[^>]*>?/gm, '').substring(0, 200)}...</p>
                            <a href="${work.url}" target="_blank" class="btn btn-outline-info">View on AO3</a>
                        </div>
                    </div>`;
                });
            } catch (err) {
                console.error("Error loading works:", err);
            }
        }

        function getRandomPicks(list, count, seed) {
            if (!list || list.length === 0) return [];
            if (list.length <= count) return list;

            let shuffled = [...list].sort(() => {
                let hash = 0;
                for (let i = 0; i < seed.length; i++) {
                    hash = ((hash << 5) - hash) + seed.charCodeAt(i);
                    hash |= 0;
                }
                return Math.sin(hash) - 0.5;
            });

            return shuffled.slice(0, count);
        }

        loadDailyHighlights();
    </script>
</body>
</html>
