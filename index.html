<!DOCTYPE html>
<html lang="en">
<head>
<style>
  /* Main container to clip the sliding content */
  .carousel-container {
    position: relative;
    width: 400px;
    margin: 2rem auto;
    overflow: hidden;
    border: 3px solid #333;
    border-radius: 8px;
    background: #fff;
  }

  /* Track that holds all items in a single row */
  .carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Individual carousel items */
  .carousel-item { 
    min-width: 100%; 
    box-sizing: border-box; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    text-align: center; 
    height: 350px; justify-content: center;
    }
  .item-badge { 
    font-size: 0.7rem; 
    font-weight: bold; 
    padding: 2px 8px; 
    border-radius: 4px; 
    text-transform: uppercase;
    margin-bottom: 8px; 
    }
  .badge-nsfw { 
    background: #fee2e2; 
    color: #991b1b; 
    }
  .badge-sfw { 
    background: #f0fdf4; 
    color: #166534; 
    }
  
  .item-title { 
    margin: 10px 0; 
    font-family: sans-serif; 
    color: #111; 
    font-size: 1.25rem; 
    }
  .item-summary { 
    font-size: 0.9rem; 
    color: #444; 
    line-height: 1.4; 
    display: -webkit-box;
    -webkit-line-clamp: 4; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
    margin-bottom: 15px; 
    height: 5.6em; 
    }
  .view-link { 
    display: inline-block; 
    padding: 8px 16px; 
    background: #2563eb; 
    color: #fff; 
    text-decoration: none; 
    border-radius: 5px; 
    font-size: 0.85rem; 
    font-weight: 600; 
    }
  .view-link:hover { 
    background: #1d4ed8; 
    }

  /* Navigation buttons */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 1.2rem;
    border-radius: 50%;
    z-index: 10;
  }
  .nav-btn:hover { background: #000; }
  .prev { left: 10px; }
  .next { right: 10px; }
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track" id="track">
    <div class="carousel-item">Loading works...</div>
  </div>
  <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="move(1)">&#10095;</button>
</div>

<script>
    let currentIndex = 0;
    const track = document.getElementById('track');

    async function initCarousel() {
        try {
            const response = await fetch('collection_works.json');
            const data = await response.json();

            // Safely grab 2 items from each category
            const getSet = (rating, type) => (data[rating] && data[rating][type]) ? data[rating][type].slice(0, 2) : [];
            
            const works = [
                ...getSet('nsfw', 'fics'), ...getSet('sfw', 'fics'),
                ...getSet('nsfw', 'art'), ...getSet('sfw', 'art')
            ];

            // Build HTML for each item
            track.innerHTML = works.map((work, index) => {
                const ratingClass = work.url.includes('nsfw') || works.indexOf(work) < 2 || (works.indexOf(work) >= 4 && works.indexOf(work) < 6) ? 'badge-nsfw' : 'badge-sfw';
                const ratingText = ratingClass === 'badge-nsfw' ? 'NSFW' : 'SFW';
                
                return `
                <div class="carousel-item">
                    <span class="item-badge ${ratingClass}">${ratingText}</span>
                    <h3 class="item-title">${work.title}</h3>
                    <div class="item-summary">${work.summary || 'No summary provided.'}</div>
                    <a href="${work.url}" class="view-link" target="_blank">Read/View Work</a>
                </div>
                `;
            }).join('');

        } catch (err) {
            console.error("Fetch error:", err);
            track.innerHTML = '<div class="carousel-item">Failed to load local data.</div>';
        }
    }

    function move(dir) {
        const slides = document.querySelectorAll('.carousel-item');
        if (!slides.length) return;
        currentIndex = (currentIndex + dir + slides.length) % slides.length;
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    initCarousel();
</script>

</body>
</html>
