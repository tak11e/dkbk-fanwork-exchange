<!DOCTYPE html>
<html lang="en">
<head>
<style>
    /* Main container to clip the sliding content */
    .carousel-container {
        position: relative;
        width: 700px;
        height: 550px;
        margin: 2rem auto;
        overflow: hidden;
        border: 3px solid #f4912e;
        border-radius: 8px;
        background: #fff;
        display: flex;
        flex-direction: column;
    }

    /* Track that holds all items in a single row */
    .carousel-track {
        display: flex;
        flex-grow: 1;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        height: calc(100% - 50px);
    }

    /* Individual carousel items */
    .carousel-item { 
        min-width: 100%; 
        box-sizing: border-box; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        height: 100%; 
    }
    .item-badge { 
        position: relative; 
        z-index: 5; 
        font-size: 0.7rem; 
        font-weight: bold; 
        padding: 3px 10px; 
        border-radius: 20px; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        flex-shrink: 0;
    }

    .badge-nsfw { background: #fee2e2; color: #4f0e00; }
    .badge-sfw { background: #f0fdf4; color: #2a332c; }

    .item-title { 
        position: relative; 
        z-index: 5; 
        margin: 5px 0 15px 0; 
        color: #111; 
        font-size: 1.2rem; 
        height: 2.8em; 
        overflow: hidden;
        flex-shrink: 0;
    }

    /* Art Specific */
    .art-preview {
        width: 60%;
        height: 60%; 
        object-fit: cover;
        object-position: center;
        border-radius: 8px; 
        margin-bottom: 15px; 
        flex-shrink: 0; 
    }

    /* Fic Specific */
    .item-summary { 
        font-size: 0.9rem; 
        color: #444; 
        line-height: 1.4; 
        margin-bottom: 10px; 
        flex-shrink: 0;
        max-height: 10em;
        overflow-y: auto;
    }
    .tag-container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 5px; 
        justify-content: center; 
        overflow-y: auto; 
        flex-grow: 1;
        width: 100%;
        margin-bottom: 15px;
    }
    .tag { 
        font-size: 0.65rem; 
        background: #f1f5f9; 
        color: #475569; 
        padding: 2px 6px; 
        border-radius: 4px; 
        border: 1px solid #e2e8f0;
        height: fit-content;
        max-height: 60%;
    }

    .view-link { 
        padding: 8px 16px; 
        background: #f4912e; 
        color: #fff; 
        text-decoration: none; 
        border-radius: 5px; 
        font-size: 0.85rem; 
        font-weight: 600; 
        margin-top: auto;
        flex-shrink: 0; 
    }

  /* Navigation buttons */
    .nav-btn {
        background: #f4912e;
        color: white;
        cursor: pointer;
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 3px;
        transition: 0.6s ease-in-out;
        top: 50%;
        transform: translateY(-50%);
        border: none;
    }
    .nav-btn:hover { background: none; color: black;}
    .prev { left: 10px; }
    .next { right: 10px; }

    /* Progress Dots */
    .progress-bar { 
        display: flex; 
        justify-content: center; 
        gap: 8px; 
        background: #f8fafc; 
        border-top: 1px solid #eee; 
        flex-shrink: 0;
        height: 50px;
        position: relative;
        align-items: center;
    }
    .dot { 
        width: 8px; 
        height: 8px; 
        background: #cbd5e1; 
        border-radius: 50%; 
        transition: all 0.3s ease; 
    }
    .dot.active { background: #f4912e; width: 20px; border-radius: 4px; }
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track" id="track">
    <div class="carousel-item">Loading works...</div>
  </div>
  <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="move(1)">&#10095;</button>

  <div class="progress-bar" id="dotsContainer"></div>
</div>

<script>
    let currentIndex = 0;
    let works = [];

    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dotsContainer');

    async function initCarousel() {
        try {
            const response = await fetch('collection_works.json');
            const data = await response.json();

            // Helper to sort by date (oldest first) and grab top 2
            const getLeastRecent = (rating, type) => {
                const list = data[rating]?.[type] || [];
                return list
                    .sort((a, b) => new Date(a.last_featured || 0) - new Date(b.last_featured || 0))
                    .slice(0, 2)
                    .map(w => ({ ...w, rating, type }))
            }

            // Create labeled arrays to help distinguish Type and Rating later
            works = [
                ...getLeastRecent('nsfw', 'fics'),
                ...getLeastRecent('sfw', 'fics'),
                ...getLeastRecent('nsfw', 'art'),
                ...getLeastRecent('sfw', 'art')
            ];

            // Build HTML for each item
            track.innerHTML = works.map(work => {
                const isArt = work.type == 'art';
                const ratingClass = work.rating == 'nsfw' ? 'badge-nsfw' : 'badge-sfw';

                // If fic
                const tagsHtml = !isArt && work.tags ? `
                <div class="tag-container">
                    ${work.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ` : '';

                // If art
                const middleContent = isArt ? `
                <img src="${work.image}" class="art-preview" alt="${work.title}" onerror="this.src='https://placeholder.com'">
                <div class="tag-container">
                    ${work.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ` : `<div class="item-summary">${work.summary}</div>${tagsHtml}`;

                return `
                    <div class="carousel-item">
                        <span class="item-badge ${ratingClass}">${work.rating} ${work.type}</span>
                        <h3 class="item-title">${work.title}</h3>
                        ${middleContent}
                        <a href="${work.url}" class="view-link" target="_blank">View on AO3</a>
                    </div>
                `;
            }).join('');

            // Generate progress bar
            dotsContainer.innerHTML = works.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');

            updateUI();

        } catch (err) {
            console.error("Fetch error:", err);
            track.innerHTML = '<div class="carousel-item">Failed to load local data.</div>';
        }
    }

    function updateUI() {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        const allDots = document.querySelectorAll('.dot');
        allDots.forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    function move(dir) {
        const slides = document.querySelectorAll('.carousel-item');
        if (!slides.length) return;
        
        currentIndex = (currentIndex + dir + slides.length) % slides.length;
        updateUI();
        
    }

    initCarousel();
</script>

</body>
</html>
