<!DOCTYPE html>
<html lang="en">
<head>
<style>
    * {
        box-sizing: border-box; 
        margin: 0;
        padding: 0;
    }

    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;  
    }
    
    .scroll-text {
        height: 47px;
        width: 89%;
        overflow: hidden;
        position: relative;
        background: #fff;
        border: 2px solid #35826D;
        border-radius: 8px;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        top: 24.5%;
        color: #000;
        /* display: flex;
        justify-content: center;
        align-items: center; */
    }
    .scroll-text p {
        position: absolute;
        width: 100%;
        height: 100%;
        margin: 0;
        line-height: 47px;
        text-align: center;
        -moz-transform: translateX(-80%);
        transform: translateX(-80%);
        -moz-animation: scroll-right 20s linear infinite;
        -webkit-animation: scroll-right 20s linear infinite;
        animation: scroll-right 20s linear infinite;
    }
    @-moz-keyframes scroll-right {
        0% { -moz-transform: translateX(-80%); }
        100% { -moz-transform: translateX(80%); }
    }
    @-webkit-keyframes scroll-right {
        0% { -webkit-transform: translateX(-80%);}
        100% { -webkit-transform: translateX(80%);}
    }
    @keyframes scroll-right {
        0% { -moz-transform: translateX(-80%); -webkit-transform: translateX(-80%); transform: translateX(-80%); }
        100% { -moz-transform: translateX(80%); -webkit-transform: translateX(80%); transform: translateX(80%); }
    }





    .carousel-container {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 875px;
        height: 525px;
        margin: 2rem auto;
        overflow: hidden;
        border: 3px solid #f4912e;
        border-radius: 8px;
        background: #fff;
        display: flex;
        flex-direction: column;
        bottom: 0px;
    }

    /* Track that holds all items in a single row */
    .carousel-track {
        display: flex;
        flex-grow: 1;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        height: calc(100% - 50px);
    }

    /* Individual carousel items */
    .carousel-item { 
        min-width: 100%; 
        box-sizing: border-box; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        height: 100%; 
    }
    .item-badge { 
        position: relative; 
        z-index: 5; 
        font-size: 0.7rem; 
        font-weight: bold; 
        padding: 3px 10px; 
        border-radius: 20px; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        flex-shrink: 0;
    }

    .badge-nsfw { background: #fee2e2; color: #4f0e00; }
    .badge-sfw { background: #f0fdf4; color: #2a332c; }

    .item-title { 
        position: relative; 
        z-index: 5; 
        margin: 5px 0 15px 0; 
        color: #111; 
        font-size: 1.2rem; 
        height: 2.8em; 
        overflow: hidden;
        flex-shrink: 0;
    }

    /* Art Specific */
    .art-content-wrapper {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 15px;
        margin-bottom: 15px;
        overflow: hidden;
        box-sizing: border-box;
        position: relative;
        width: 100%;
        height: 70%;
    }
    .spoiler-container,
    .art-preview-wrapper {
        flex: 1;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 8px;
        height: 100%;
    }
    .art-preview {
        width: 100%;
        height: 100%;
        object-fit: cover;         
        object-position: center;   
        display: block;
        transition: filter 0.3s ease, transform 0.3s ease;
    }
    .side-tags {
        width: 45%;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px 4px;
        justify-content: flex-start;
        align-content: flex-start;
        overflow-y: auto;
        height: 100%;
        /* padding: 0 5px 0 0 !important; */
    }

    /* Spoiler overlay */
    .spoiler-container:not(.revealed) .art-preview {
        filter: blur(40px);
        transform: scale(1.1);
    }
    .spoiler-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        transition: opacity 0.2s ease;
    }
    .spoiler-container.revealed .spoiler-overlay {
        opacity: 0;
        pointer-events: none;
    }
    .spoiler-container.revealed .art-preview {
        filter: blur(0);
        transform: scale(1);
    }
    .spoiler-text {
        color: #fff;
        background-color: rgba(0, 0, 0, 0.6);
        padding: 8px 16px;
        border-radius: 8px;
        text-transform: uppercase;
        user-select: none;
        pointer-events: none;
    }
    .spoiler-container:hover .spoiler-text {
        background-color: rgba(0, 0, 0, 0.8);
    }

    /* Fic Specific */
    .item-summary { 
        font-size: 0.9rem; 
        color: #444; 
        line-height: 1.5; 
        margin: 0 auto 20px auto;
        flex-shrink: 0;
        width: 85%;
        max-height: 40%;
        overflow-y: auto;
        text-align: center;
    }
    .carousel-item:not(:has(.art-content-wrapper)) .tag-container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 6px 5px; 
        justify-content: center; 
        overflow-y: auto; 
        flex-grow: 1;
        width: 90%;
        margin: 0 auto;
        padding: 10px;
        align-content: flex-start;
        max-height: 40%;
    }
    .tag { 
        font-size: 1rem; 
        background: #f1f5f9; 
        color: #475569; 
        padding: 4px 8px; 
        border-radius: 4px; 
        border: 1px solid #e2e8f0;
        height: fit-content;

        /* Wrapping logic for long tags */
        white-space: normal;
        word-break: break-word;
        overflow-wrap: break-word;
        text-align: left;
        display: inline-flex;
        max-width: 100%;
    }

    .view-link { 
        padding: 8px 16px; 
        background: #f4912e; 
        color: #fff; 
        text-decoration: none; 
        border-radius: 5px; 
        font-size: 0.85rem; 
        font-weight: 600; 
        margin-top: auto;
        flex-shrink: 0; 
    }

  /* Navigation buttons */
    .nav-btn {
        background: #f4912e;
        color: white;
        cursor: pointer;
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 3px;
        transition: 0.6s ease-in-out;
        top: 50%;
        transform: translateY(-50%);
        border: none;
    }
    .nav-btn:hover { background: none; color: black;}
    .prev { left: 10px; }
    .next { right: 10px; }

    /* Progress Dots */
    .progress-bar { 
        display: flex; 
        justify-content: center; 
        gap: 8px; 
        background: #f8fafc; 
        border-top: 1px solid #eee; 
        flex-shrink: 0;
        height: 50px;
        position: relative;
        align-items: center;
    }
    .dot { 
        width: 8px; 
        height: 8px; 
        background: #cbd5e1; 
        border-radius: 50%; 
        transition: all 0.3s ease; 
    }
    .dot.active { background: #f4912e; width: 20px; border-radius: 4px; }
</style>
</head>
<body>
    <!-- Scrolling Updates -->
    <div class="scroll-text">
        <p>THIS IS A LONG MESSAGE TO TEST THE DKBK FANWORK EXCHANGE'S SCROLLING ANNOUNCMENT SYSTEM • THIS IS A SHORT MESSAGE • </P>
    </div>

<div class="carousel-container">
  <div class="carousel-track" id="track">
    <div class="carousel-item">Loading works...</div>
  </div>
  <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="move(1)">&#10095;</button>

  <div class="progress-bar" id="dotsContainer"></div>
</div>

<script>
    let currentIndex = 0;
    let works = [];

    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dotsContainer');

    async function initCarousel() {
        try {
            const response = await fetch('collection_works.json');
            const data = await response.json();

            // Helper to sort by date (oldest first) and grab top 2
            const getLeastRecent = (rating, type) => {
                const list = data[rating]?.[type] || [];
                return list
                    .sort((a, b) => new Date(a.last_featured || 0) - new Date(b.last_featured || 0))
                    .slice(0, 2)
                    .map(w => ({ ...w, rating, type }))
            }

            // Create labeled arrays to help distinguish Type and Rating later
            works = [
                ...getLeastRecent('sfw', 'fic'),
                ...getLeastRecent('sfw', 'art'),
                ...getLeastRecent('nsfw', 'fic'),
                ...getLeastRecent('nsfw', 'art')
            ];

            // Build HTML for each item
            track.innerHTML = works.map(work => {
                const isArt = work.type == 'art';
                const isNSFW = work.rating == 'nsfw';
                const ratingClass = isNSFW ? 'badge-nsfw' : 'badge-sfw';

                // Common tags html
                const tagsHtml = work.tags ? `
                <div class="tag-container ${isArt ? 'side-tags' : ''}">
                    ${work.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ` : '';

                // If art
                const middleContent = isArt ? `
                    <div class="art-content-wrapper">
                        ${isNSFW ? `
                            <div class="spoiler-container" onclick="this.classList.toggle('revealed')">
                                <img src="${work.image}" class="art-preview" alt="${work.title}" onerror="this.src='https://placeholder.com'">
                                <div class="spoiler-overlay">
                                    <span class="spoiler-text">SPOILER</span>
                                </div>
                            </div>
                        ` : `
                            <div class="art-preview-wrapper">
                                <img src="${work.image}" class="art-preview" onerror="this.src='https://placeholder.com'">
                            </div>
                        `}
                        ${tagsHtml}
                    </div>
                ` : `
                    <div class="item-summary">${work.summary}</div>
                    ${tagsHtml}
                `;

                return `
                    <div class="carousel-item">
                        <span class="item-badge ${ratingClass}">${work.rating} ${work.type}</span>
                        <h3 class="item-title">${work.title}</h3>
                        ${middleContent}
                        <a href="${work.url}" class="view-link" target="_blank">View on AO3</a>
                    </div>
                `;
            }).join('');

            // Generate progress bar
            dotsContainer.innerHTML = works.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');

            updateUI();

        } catch (err) {
            console.error("Fetch error:", err);
            track.innerHTML = '<div class="carousel-item">Failed to load local data.</div>';
        }
    }

    function updateUI() {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        const allDots = document.querySelectorAll('.dot');
        allDots.forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    function move(dir) {
        const slides = document.querySelectorAll('.carousel-item');
        if (!slides.length) return;
        
        currentIndex = (currentIndex + dir + slides.length) % slides.length;
        updateUI();
        
    }

    initCarousel();
</script>

</body>
</html>
