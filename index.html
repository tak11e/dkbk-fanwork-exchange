<!DOCTYPE html>
<html lang="en">
<head>
<style>
    /* Main container to clip the sliding content */
    .carousel-container {
        position: relative;
        width: 400px;
        margin: 2rem auto;
        overflow: hidden;
        border: 3px solid #333;
        border-radius: 8px;
        background: #fff;
    }

    /* Track that holds all items in a single row */
    .carousel-track {
        display: flex;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Individual carousel items */
    .carousel-item { 
        min-width: 100%; 
        box-sizing: border-box; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        height: 350px; justify-content: center;
    }
    .item-badge { 
        font-size: 0.7rem; 
        font-weight: bold; 
        padding: 2px 8px; 
        border-radius: 4px; 
        text-transform: uppercase;
        margin-bottom: 8px; 
    }
    .badge-nsfw { 
        background: #fee2e2; 
        color: #991b1b; 
    }
    .badge-sfw { 
        background: #f0fdf4; 
        color: #166534; 
    }
    .item-title { 
        margin: 10px 0; 
        font-family: sans-serif; 
        color: #111; 
        font-size: 1.25rem; 
    }

    /* Art Specific */
    .art-preview {
        width: 100%;
        height: 220px; 
        object-fit: cover;
        object-position: center;
        background: #fafafa; 
        border-radius: 8px; 
        margin-bottom: 15px; 
        border: 1px solid #eee; 
        flex-shrink: 0;
    }

    /* Fic Specific */
    .item-summary { 
        font-size: 0.9rem; 
        color: #444; 
        line-height: 1.4; 
        display: -webkit-box;
        -webkit-line-clamp: 4; 
        -webkit-box-orient: vertical; 
        overflow: hidden; 
        margin-bottom: 15px; 
        height: 5.6em; 
    }
    .tag-container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 5px; 
        justify-content: center; 
        margin-bottom: 15px; 
        max-height: 80px; 
        overflow-y: auto; 
        padding: 5px; 
    }
    .tag { 
        font-size: 0.65rem; 
        background: #f1f5f9; 
        color: #475569; 
        padding: 2px 6px; 
        border-radius: 4px; 
        border: 1px solid #e2e8f0; 
    }

    .view-link { 
        display: inline-block; 
        padding: 8px 16px; 
        background: #2563eb; 
        color: #fff; 
        text-decoration: none; 
        border-radius: 5px; 
        font-size: 0.85rem; 
        font-weight: 600; 
    }

  /* Navigation buttons */
    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        padding: 12px 16px;
        cursor: pointer;
        font-size: 1.2rem;
        border-radius: 50%;
        z-index: 10;
    }
    .nav-btn:hover { background: #000; }
    .prev { left: 10px; }
    .next { right: 10px; }

    /* Dots Bar */
    .progress-bar { 
        display: flex; 
        justify-content: center; 
        gap: 8px; 
        padding: 15px 0; 
        background: #f8fafc; 
        border-top: 1px solid #eee; 
    }
    .dot { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; transition: 0.3s; }
    .dot.active { background: #2563eb; width: 20px; border-radius: 4px; }
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track" id="track">
    <div class="carousel-item">Loading works...</div>
  </div>
  <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="move(1)">&#10095;</button>

  <div class="progress-bar" id="dotsContainer"></div>
</div>

<script>
    let currentIndex = 0;
    let totalWorks = 0;

    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dotsContainer');
    const dots = document.querySelectorAll('.dot');

    async function initCarousel() {
        try {
            const response = await fetch('collection_works.json');
            const data = await response.json();

            // Create labeled arrays to help distinguish Type and Rating later
            const works = [
                ...((data.nsfw?.fics || []).slice(0, 2).map(w => ({ ...w, rating: 'nsfw', type: 'fic' }))),
                ...((data.sfw?.fics || []).slice(0, 2).map(w => ({ ...w, rating: 'sfw', type: 'fic' }))),
                ...((data.nsfw?.art || []).slice(0, 2).map(w => ({ ...w, rating: 'nsfw', type: 'art' }))),
                ...((data.sfw?.art || []).slice(0, 2).map(w => ({ ...w, rating: 'sfw', type: 'art' })))
            ];

            totalWorks = works.length

            // Build HTML for each item
            track.innerHTML = works.map(work => {
                const isArt = work.type == 'art';
                const ratingClass = work.rating == 'nsfw' ? 'badge-nsfw' : 'badge-sfw';

                // If fic
                const tagsHtml = !isArt && work.tags ? `
                <div class="tag-container">
                    ${work.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ` : '';

                // If art
                const middleContent = isArt ? `
                <img src="${work.image}" class="art-preview" alt="${work.title}" onerror="this.src='https://placeholder.com'">
                ` : `<div class="item-summary">${work.summary}</div>${tagsHtml}`;

                return `
                    <div class="carousel-item">
                        <span class="item-badge ${ratingClass}">${work.rating} ${work.type}</span>
                        <h3 class="item-title">${work.title}</h3>
                        ${middleContent}
                        <a href="${work.url}" class="view-link" target="_blank">View on AO3</a>
                    </div>
                `;
            }).join('');

            // Generate progress bar
            dotsContainer.innerHTML = works.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');

        } catch (err) {
            console.error("Fetch error:", err);
            track.innerHTML = '<div class="carousel-item">Failed to load local data.</div>';
        }
    }

    function move(dir) {
        const slides = document.querySelectorAll('.carousel-item');
        if (!slides.length) return;
        currentIndex = (currentIndex + dir + slides.length) % slides.length;
        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        // Slide the track
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
    
        // Update dots
        dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
    }

    initCarousel();
</script>

</body>
</html>
