<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>

    * {
        box-sizing: border-box; 
        margin: 0;
        padding: 0;
    }

    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;  
    }
    
    .scroll-text {
        font-family: 'Libre Franklin';
        height: 5%;
        /* height: 47px; */
        width: 88%;
        overflow: hidden;
        position: relative;
        background: #35826D;
        border-radius: 8px;
        left: 50%;
        transform: translateX(-50%);
        top: 24.5%;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .scroll-text p {
        width: 100%;
        position: relative;
        margin: 0;
        line-height: normal;
        text-wrap-mode: nowrap;
        text-align: center;
        -moz-transform: translateX(80%);
        transform: translateX(80%);
        -moz-animation: scroll-right 15s linear infinite;
        -webkit-animation: scroll-right 15s linear infinite;
        animation: scroll-right 15s linear infinite;
    }
    @-moz-keyframes scroll-right {
        0% { -moz-transform: translateX(80%); }
        100% { -moz-transform: translateX(-80%); }
    }
    @-webkit-keyframes scroll-right {
        0% { -webkit-transform: translateX(80%);}
        100% { -webkit-transform: translateX(-80%);}
    }
    @keyframes scroll-right {
        0% { -moz-transform: translateX(80%); -webkit-transform: translateX(80%); transform: translateX(80%); }
        100% { -moz-transform: translateX(-80%); -webkit-transform: translateX(-80%); transform: translateX(-80%); }
    }
    .scroll-text:hover p {
        animation-play-state: paused;
    }

    .countdown {
        font-family: 'Lilita One';
        font-weight: bold;
        /* height: 80px; */
        height: 8%;
        width: 43%;
        background: #f4912e;
        border-radius: 8px;
        left: 6%;
        position: relative;
        top: 27%;
        display: flex;
        align-items: center;
        color: #fff;
        display: flex;
        justify-content: center;
    }
    .countdown h1 {
        position: relative;
        display: block;
        text-align: center;
        overflow: hidden;
        word-spacing: clamp(10px, 4vw, 40px);
        font-size: 7vh;
        transform: none;
        margin: 0;
        width: 100%;
    }



    .carousel-container {
        position: relative;
        left: 0%;
        /* width: 875px; */
        width: 47%;
        height: 55%;
        bottom: -31%;
        /* height: 525px; */
        margin: 2rem auto;
        overflow: hidden;
        border: 3px solid #f4912e;
        border-radius: 8px;
        background: #fff;
        display: flex;
        flex-direction: column;
    }

    /* Track that holds all items in a single row */
    .carousel-track {
        display: flex;
        flex-grow: 1;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        height: calc(100% - 50px);
    }

    /* Individual carousel items */
    .carousel-item { 
        min-width: 100%; 
        box-sizing: border-box; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        height: 100%; 
    }
    .item-badge { 
        position: relative; 
        z-index: 5; 
        font-size: 0.7rem; 
        font-weight: bold; 
        padding: 3px 10px; 
        border-radius: 20px; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        flex-shrink: 0;
    }

    .badge-nsfw { background: #fee2e2; color: #4f0e00; }
    .badge-sfw { background: #f0fdf4; color: #2a332c; }

    .item-title { 
        position: relative; 
        z-index: 5; 
        margin: 5px 0 15px 0; 
        color: #111; 
        font-size: 20px; 
        overflow: hidden;
        flex-shrink: 0;
        font-family: 'Lilita One';
        font-weight: normal;
    }

    /* Art Specific */
    .art-content-wrapper {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 15px;
        margin-bottom: 15px;
        overflow: hidden;
        box-sizing: border-box;
        position: relative;
        width: 100%;
        height: 70%;
    }
    .spoiler-container,
    .art-preview-wrapper {
        flex: 1;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 8px;
        height: 100%;
    }
    .art-preview {
        width: 100%;
        height: 100%;
        object-fit: cover;         
        object-position: center;   
        display: block;
        transition: filter 0.3s ease, transform 0.3s ease;
    }
    .side-tags {
        width: 45%;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px 4px;
        justify-content: flex-start;
        align-content: flex-start;
        overflow-y: auto;
        height: 100%;
        /* padding: 0 5px 0 0 !important; */
    }

    /* Spoiler overlay */
    .spoiler-container:not(.revealed) .art-preview {
        filter: blur(40px);
        transform: scale(1.1);
    }
    .spoiler-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        transition: opacity 0.2s ease;
    }
    .spoiler-container.revealed .spoiler-overlay {
        opacity: 0;
        pointer-events: none;
    }
    .spoiler-container.revealed .art-preview {
        filter: blur(0);
        transform: scale(1);
    }
    .spoiler-text {
        color: #fff;
        background-color: rgba(0, 0, 0, 0.6);
        padding: 8px 16px;
        border-radius: 8px;
        text-transform: uppercase;
        user-select: none;
        pointer-events: none;
    }
    .spoiler-container:hover .spoiler-text {
        background-color: rgba(0, 0, 0, 0.8);
    }

    /* Fic Specific */
    .item-summary { 
        font-size: 0.9rem; 
        color: #444; 
        margin: 0 auto 20px auto;
        flex-shrink: 0;
        width: 85%;
        max-height: 40%;
        overflow-y: auto;
        text-align: left;
    }
    .item-summary blockquote {
        display: block !important;
    }
    .item-summary blockquote p {
        line-height: 1.5 !important;
        white-space: pre-wrap !important;
        margin: 0 !important;
        padding-bottom: 1.2em !important; 
        display: block !important;
    }
    .userstuff blockquote {
        line-height: 1.5;
        margin-inline-start: 1.5em;
        padding: 0.75em;
        border-inline-start: 2px solid #999;
    }

    .carousel-item:not(:has(.art-content-wrapper)) .tag-container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 6px 5px; 
        justify-content: center; 
        overflow-y: auto; 
        flex-grow: 1;
        width: 90%;
        margin: 0 auto;
        margin-bottom: 10px;
        margin-top: 20px;
        padding: 10px;
        align-content: flex-start;
        max-height: 25%;
    }
    .tag { 
        font-size: 1rem; 
        background: #f1f5f9; 
        color: #475569; 
        padding: 4px 8px; 
        border-radius: 4px; 
        border: 1px solid #e2e8f0;
        height: fit-content;

        /* Wrapping logic for long tags */
        white-space: normal;
        word-break: break-word;
        overflow-wrap: break-word;
        text-align: left;
        display: inline-flex;
        max-width: 100%;
    }

    .view-link { 
        padding: 8px 16px; 
        background: #f4912e; 
        color: #fff; 
        text-decoration: none; 
        border-radius: 5px; 
        font-size: 0.85rem; 
        font-weight: 600; 
        margin-top: auto;
        flex-shrink: 0; 
    }

  /* Navigation buttons */
    .nav-btn {
        background: #f4912e;
        color: white;
        cursor: pointer;
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 3px;
        transition: 0.6s ease-in-out;
        top: 50%;
        transform: translateY(-50%);
        border: none;
    }
    .nav-btn:hover { background: none; color: black;}
    .prev { left: 10px; }
    .next { right: 10px; }

    /* Progress Dots */
    .progress-bar { 
        display: flex; 
        justify-content: center; 
        gap: 8px; 
        background: #f8fafc; 
        border-top: 1px solid #eee; 
        flex-shrink: 0;
        height: 50px;
        position: relative;
        align-items: center;
    }
    .dot { 
        width: 8px; 
        height: 8px; 
        background: #cbd5e1; 
        border-radius: 50%; 
        transition: all 0.3s ease; 
    }
    .dot.active { background: #f4912e; width: 20px; border-radius: 4px; }
</style>
</head>
<body>
        <!-- Scrolling Updates -->
        <div class="scroll-text">
            <p>THIS IS A LONG MESSAGE TO TEST THE DKBK FANWORK EXCHANGE'S SCROLLING ANNOUNCMENT SYSTEM • THIS IS A SHORT MESSAGE • </P>
        </div>

        <!-- Countdown/Calendar -->
        <div class="countdown">
            <h1>
                <span id="days">00</span>d
                <span id="hours">00</span>h
                <span id="minutes">00</span>m
                <span id="seconds">00</span>s
            </h1>
        </div>

        <div class="carousel-container">
            <div class="carousel-track" id="track">
                <div class="carousel-item">Loading works...</div>
            </div>
            <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
            <button class="nav-btn next" onclick="move(1)">&#10095;</button>

            <div class="progress-bar" id="dotsContainer"></div>
        </div>
<script>
    let currentIndex = 0;
    let works = [];

    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dotsContainer');

    // function getDailySeed() {
    //     return new Date().toISOString().slice(0, 10);
    // }

    // // Seeded random function (Mulberry32)
    // function splitmix32(a) {
    //     return function() {
    //         a |= 0; a = a + 0x9e3779b9 | 0;
    //         let t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
    //         t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
    //         return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
    //     }
    // }

    async function initCarousel() {
        try {
            const response = await fetch('https://carousel-script.takiepeterson.workers.dev');
            const data = await response.json();
            const todayDate = new Date();
            const today = todayDate.toLocaleDateString('en-US'); // e.g. "4/13/2026"
            const todayAlt = todayDate.toLocaleDateString('en-US', { 
                month: '2-digit', day: '2-digit', year: 'numeric' 
            });

            works = [];
            for (const rating in data) {
                for (const type in data[rating]) {
                    const picked = data[rating][type].filter(w => 
                        w.last_featured == today || w.last_featured == todayAlt
                    );
                    works.push(...picked);
                }
            }

            // const seed = getDailySeed();
            // const rnd = splitmix32(hashString(seed));

            // const getRandomTwo = (rating, type) => {
            //     const list = [...(data[rating]?.[type] || [])];
            //     const selected = [];
            
            //     // Pick 2 using the seeded random
            //     for(let i = 0; i < 2 && list.length > 0; i++) {
            //         const index = Math.floor(rnd() * list.length);
            //         const item = list.splice(index, 1)[0];
            //         selected.push({ ...item, rating, type });
            //     }
            //     return selected;
            // };

            // works = [
            //     ...getRandomTwo('sfw', 'fic'),
            //     ...getRandomTwo('sfw', 'art'),
            //     ...getRandomTwo('nsfw', 'fic'),
            //     ...getRandomTwo('nsfw', 'art')
            // ];

            // Build HTML for each item
            track.innerHTML = works.map(work => {
                const isArt = work.type == 'art';
                const isNSFW = work.rating == 'nsfw';
                const ratingClass = isNSFW ? 'badge-nsfw' : 'badge-sfw';
                const authorList = work.authors.length > 0 
                    ? work.authors.join(", ") 
                    : "Anon";

                // replace <br> with </p><p>
                const formattedSummary = work.summary.replace(/<br\s*\/?>/gi, '</p><p>');

                // Common tags html
                const tagsHtml = work.tags ? `
                <div class="tag-container ${isArt ? 'side-tags' : ''}">
                    ${work.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ` : '';

                // If art
                const middleContent = isArt ? `
                    <div class="art-content-wrapper">
                        ${isNSFW ? `
                            <div class="spoiler-container" onclick="this.classList.toggle('revealed')">
                                <img src="${work.image}" class="art-preview" alt="${work.title}" onerror="this.src='https://placeholder.com'">
                                <div class="spoiler-overlay">
                                    <span class="spoiler-text">SPOILER</span>
                                </div>
                            </div>
                        ` : `
                            <div class="art-preview-wrapper">
                                <img src="${work.image}" class="art-preview" onerror="this.src='https://placeholder.com'">
                            </div>
                        `}
                        ${tagsHtml}
                    </div>
                ` : `
                    <div class="item-summary">
                        <blockquote class="userstuff">${formattedSummary}</blockquote>
                    </div>
                    ${tagsHtml}
                `;

                return `
                    <div class="carousel-item">
                        <span class="item-badge ${ratingClass}">${work.rating} ${work.type}</span>
                        <h3 class="item-title">${work.title}</h3>
                        <p class="author">By: <strong>${authorList}</strong></p>
                        ${middleContent}
                        <a href="${work.url}" class="view-link" target="_blank">View on AO3</a>
                    </div>
                `;
            }).join('');

            // Generate progress bar
            dotsContainer.innerHTML = works.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');

            updateUI();

        } catch (err) {
            console.error("Fetch error:", err);
            track.innerHTML = '<div class="carousel-item">Failed to load local data.</div>';
        }
    }

    function updateUI() {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        const allDots = document.querySelectorAll('.dot');
        allDots.forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    function move(dir) {
        const slides = document.querySelectorAll('.carousel-item');
        if (!slides.length) return;
        
        currentIndex = (currentIndex + dir + slides.length) % slides.length;
        updateUI();
        
    }

    // COUNTDOWN LOGIC //
    document.addEventListener('DOMContentLoaded', () => {
        const targetDate = new Date("April 10, 2026 23:59:59").getTime();
        const countdown = document.querySelector(".countdown")

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);

                countdown.innerHTML = `<h1>Check back later!</h1>`
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24))
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }, 1000);
    })

    initCarousel();
</script>

</body>
</html>
